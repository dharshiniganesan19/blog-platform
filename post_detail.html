<h1>{{ post.title }}</h1>
<p>{{ post.content }}</p>

<h3>Comments</h3>

{% for c in comments %}
    <p>{{ c.text }}</p>
{% endfor %}

<h3>Add Comment</h3>
<form method="POST">
    <input name="text" placeholder="Write comment">
    <button type="submit">Send</button>
</form>
